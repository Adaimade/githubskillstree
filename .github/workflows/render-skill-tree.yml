name: Render Skill Tree SVG

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "github_client.py"
      - "svg_render.py"
      - "skills_config.py"
      - "render_svg.py"
      - ".github/workflows/render-skill-tree.yml"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Render SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python render_svg.py Adaimade skill-tree.svg

      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: Adaimade/Adaimade
          token: ${{ secrets.PROFILE_REPO_PAT }}
          path: profile-repo

      - name: Copy SVG into profile repo
        run: cp skill-tree.svg profile-repo/skill-tree.svg

      - name: Commit & push if changed
        working-directory: profile-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet skill-tree.svg; then
            echo "No changes to skill-tree.svg"
          else
            git add skill-tree.svg
            git commit -m "chore: update skill-tree.svg"
            git push
          fi
